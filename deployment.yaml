---
apiVersion: v1
kind: Pod 
metadata:
  name: mypod
  labels:
    app: dev-pod
spec:
  containers:
    - name: myblue-container
      image: l984912521466.dkr.ecr.us-west-2.amazonaws.com/dev/spc:latest
      ports:
        - containerPort: 80  

---
apiVersion: v1
kind: Service 
metadata: 
  name: mysvc
spec:
  type: NodePort
  selector:
    app: dev-pod
  ports:
    - port: 80
      protocol: TCP 
      nodePort: 32000 