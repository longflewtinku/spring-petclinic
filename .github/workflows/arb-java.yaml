name: Java based workflow

on: 
  push:
    branches:
      - main 

jobs:
  build: 
    runs-on: self-hosted
    steps:
      - name: checkout code
        uses: actions/checkout@v7
      - name: java version
        run: java --version
      - name: maven version 
        run: mvn --version 
      - name: build package and scan
        env: 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    
        run: |
          mvn sonar:sonar \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsoanr.organization=longflewtinku  \
            -Dsonar.projectKey=longflewtinku_spring-petclinic \
            -Dsonar.host.url=https://sonarcloud.io/   
